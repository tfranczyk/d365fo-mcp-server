# Azure Pipeline for Custom D365FO Metadata Updates
# This pipeline updates custom models from the Azure DevOps Git repository
# Use this after any change to custom models
#
# Parameter skipExtraction=true: skip Git extraction (steps 3-4) and download
# existing metadata from blob storage via azcopy, then rebuild DB only.

trigger: none  # Manual execution only

parameters:
  - name: extractionMode
    displayName: 'Extraction Mode'
    type: string
    default: 'custom'
    values:
      - custom
      - standard
      - all
  - name: customModels
    displayName: 'Custom Models (comma-separated, or all)'
    type: string
    default: 'all'
  - name: skipExtraction
    displayName: 'Skip extraction (rebuild DB from existing blob metadata)'
    type: boolean
    default: false

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: mcpServer
      type: github
      endpoint: tfranczyk_d365fo-mcp-server
      name: tfranczyk/d365fo-mcp-server
      ref: refs/heads/main

variables:
  - group: xpp-mcp-server-config
  - name: nodeVersion
    value: '24.x'
  - name: METADATA_PATH
    value: './metadata'
  - name: DB_PATH
    value: './database/xpp-metadata.db'
  - name: LABELS_DB_PATH
    value: './database/xpp-metadata-labels.db'
  - name: PACKAGES_PATH
    value: '$(Build.Repository.LocalPath)/Metadata'
  - name: MCP_SERVER_PATH
    value: '$(Pipeline.Workspace)/mcp-server'

stages:
  # ============================================================================
  # Stage 0: Manual approval gate
  # Configured via Azure DevOps environment 'xpp-mcp-data-build' → Approvals and checks.
  # Approver: tfranczyk@anegis.com
  # ============================================================================
  - stage: Approval
    displayName: 'Manual approval'
    jobs:
      - deployment: WaitForApproval
        displayName: 'Wait for approval'
        environment: 'xpp-mcp-data-build'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo 'Approved — proceeding to metadata processing.'
                  displayName: 'Approval granted'

  # ============================================================================
  # Stage 1: Process Metadata Based on Mode
  # ============================================================================
  - stage: ProcessMetadata
    displayName: 'Process Metadata'
    dependsOn: Approval
    condition: succeeded()
    jobs:
      - job: ProcessJob
        displayName: 'Extract, Build, and Upload'
        steps:
          # ========== Checkout D365FO source code (Azure DevOps) ==========
          - checkout: self
            displayName: 'Checkout D365FO source code'
            clean: true

          # ========== Checkout MCP Server code from GitHub ==========
          - checkout: mcpServer
            displayName: 'Checkout MCP Server code from GitHub'
            path: mcp-server

          # ========== Step 1: Install Node.js and Dependencies ==========

          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              set -e
              echo "Resolving checkout paths..."

              CANDIDATE_MCP_1="$(Pipeline.Workspace)/mcp-server"
              CANDIDATE_MCP_2="$(Build.SourcesDirectory)/mcp-server"
              CANDIDATE_MCP_3="$(Pipeline.Workspace)/s/mcp-server"

              if [ -f "$CANDIDATE_MCP_1/package.json" ]; then
                RESOLVED_MCP="$CANDIDATE_MCP_1"
              elif [ -f "$CANDIDATE_MCP_2/package.json" ]; then
                RESOLVED_MCP="$CANDIDATE_MCP_2"
              elif [ -f "$CANDIDATE_MCP_3/package.json" ]; then
                RESOLVED_MCP="$CANDIDATE_MCP_3"
              else
                echo "ERROR: Could not resolve MCP server path"
                echo "Checked:"
                echo " - $CANDIDATE_MCP_1"
                echo " - $CANDIDATE_MCP_2"
                echo " - $CANDIDATE_MCP_3"
                exit 1
              fi

              echo "Resolved MCP_SERVER_PATH: $RESOLVED_MCP"
              echo "Build.SourcesDirectory: $(Build.SourcesDirectory)"
              echo "Pipeline.Workspace: $(Pipeline.Workspace)"

              echo "##vso[task.setvariable variable=MCP_SERVER_PATH]$RESOLVED_MCP"
            displayName: 'Resolve checkout paths'

          - script: |
              echo "MCP_SERVER_PATH: $(MCP_SERVER_PATH)"
              echo "PACKAGES_PATH: $(PACKAGES_PATH)"
              ls -la "$(MCP_SERVER_PATH)" | head -20
              npm ci
            displayName: 'Install NPM dependencies'
            workingDirectory: '$(MCP_SERVER_PATH)'

          - script: |
              set -e
              echo "Validating D365FO package path..."

              has_model_folders() {
                local root="$1"
                [ -d "$root" ] || return 1
                find "$root" -mindepth 3 -maxdepth 3 -type d \( \
                  -iname 'AxClass' -o -iname 'AxTable' -o -iname 'AxForm' -o \
                  -iname 'AxQuery' -o -iname 'AxView' -o -iname 'AxDataEntityView' -o \
                  -iname 'AxEnum' -o -iname 'AxEdt' -o -iname 'AxReport' \
                \) | head -1 | grep -q .
              }

              CANDIDATES=(
                "$(PACKAGES_PATH)"
                "$(Build.Repository.LocalPath)/PackagesLocalDirectory"
                "$(Build.Repository.LocalPath)/Metadata"
                "$(Build.SourcesDirectory)/PackagesLocalDirectory"
                "$(Build.SourcesDirectory)/Metadata"
              )

              RESOLVED_PACKAGES=""
              for candidate in "${CANDIDATES[@]}"; do
                if has_model_folders "$candidate"; then
                  RESOLVED_PACKAGES="$candidate"
                  break
                fi
              done

              # Fallback: scan the self repository and derive package root from an Ax* folder path.
              if [ -z "$RESOLVED_PACKAGES" ]; then
                REPO_ROOT="$(Build.Repository.LocalPath)"
                AX_DIR=$(find "$REPO_ROOT" -mindepth 3 -maxdepth 8 -type d \( \
                  -iname 'AxClass' -o -iname 'AxTable' -o -iname 'AxForm' -o \
                  -iname 'AxQuery' -o -iname 'AxView' -o -iname 'AxDataEntityView' -o \
                  -iname 'AxEnum' -o -iname 'AxEdt' -o -iname 'AxReport' \
                \) | head -1 || true)

                if [ -n "$AX_DIR" ]; then
                  # Example: <root>/<Model>/<Model>/AxClass => root is 3 levels above AxClass.
                  RESOLVED_PACKAGES=$(dirname "$(dirname "$(dirname "$AX_DIR")")")
                  echo "Discovered Ax* folder: $AX_DIR"
                fi
              fi

              if [ -z "$RESOLVED_PACKAGES" ]; then
                echo "ERROR: Could not resolve D365FO package path (no model Ax* folders found)"
                echo "Checked:"
                for candidate in "${CANDIDATES[@]}"; do
                  echo " - $candidate"
                done
                echo "Repository root scanned: $(Build.Repository.LocalPath)"
                echo "Tip: set PACKAGES_PATH to your repo root that contains <Model>/<Model>/AxClass"
                exit 1
              fi

              echo "Resolved PACKAGES_PATH: $RESOLVED_PACKAGES"
              echo "##vso[task.setvariable variable=PACKAGES_PATH]$RESOLVED_PACKAGES"
              echo "##vso[task.setvariable variable=D365FO_PACKAGE_PATH]$RESOLVED_PACKAGES"
            displayName: 'Validate D365FO package path'
            condition: eq('${{ parameters.skipExtraction }}', false)
            workingDirectory: '$(MCP_SERVER_PATH)'

          # ========== Step 2a: Download Existing DB (custom mode, skipExtraction=false) ==========
          # Preserves standard models already compiled into the DB

          - script: npm run blob-manager download-database
            displayName: 'Download existing database (custom mode)'
            condition: and(eq('${{ parameters.extractionMode }}', 'custom'), eq('${{ parameters.skipExtraction }}', false))
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              DB_PATH: $(DB_PATH)

          # ========== Step 2b: Download Standard Metadata via azcopy ==========
          # standard/all mode (any skipExtraction) OR custom mode with skipExtraction=true
          # Uses azcopy — massively parallel, much faster than Node.js SDK for many small XML files.

          - script: |
              ACCOUNT_NAME=$(echo "$AZURE_STORAGE_CONNECTION_STRING" | grep -oP 'AccountName=\K[^;]+')
              ACCOUNT_KEY=$(echo "$AZURE_STORAGE_CONNECTION_STRING" | grep -oP 'AccountKey=\K[^;]+')
              EXPIRY=$(date -u -d '+4 hours' '+%Y-%m-%dT%H:%MZ')
              SAS_TOKEN=$(az storage container generate-sas \
                --account-name "$ACCOUNT_NAME" \
                --account-key "$ACCOUNT_KEY" \
                --name "$BLOB_CONTAINER_NAME" \
                --permissions rl \
                --expiry "$EXPIRY" \
                --output tsv)

              TEMP_DIR="$MCP_SERVER_PATH/_azcopy_tmp_std"
              DEST_DIR="$MCP_SERVER_PATH/metadata"
              SOURCE_URL="https://${ACCOUNT_NAME}.blob.core.windows.net/${BLOB_CONTAINER_NAME}/metadata/standard/?${SAS_TOKEN}"

              echo "Downloading standard metadata via azcopy..."
              mkdir -p "$TEMP_DIR" "$DEST_DIR"
              AZCOPY_CONCURRENCY_VALUE=64 azcopy copy "$SOURCE_URL" "$TEMP_DIR/" \
                --recursive \
                --log-level WARNING

              if [ -d "$TEMP_DIR/standard" ]; then
                mv "$TEMP_DIR/standard/"* "$DEST_DIR/"
              else
                mv "$TEMP_DIR/"* "$DEST_DIR/" 2>/dev/null || true
              fi
              rm -rf "$TEMP_DIR"

              echo "Standard metadata download complete. Files: $(find "$DEST_DIR" -type f | wc -l)"
            displayName: 'Download standard metadata via azcopy'
            condition: or(ne('${{ parameters.extractionMode }}', 'custom'), eq('${{ parameters.skipExtraction }}', true))
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)

          # ========== Step 2c: Download Custom Metadata via azcopy (skipExtraction=true only) ==========
          # When skipExtraction=true, download existing custom metadata from blob instead of Git extraction

          - script: |
              ACCOUNT_NAME=$(echo "$AZURE_STORAGE_CONNECTION_STRING" | grep -oP 'AccountName=\K[^;]+')
              ACCOUNT_KEY=$(echo "$AZURE_STORAGE_CONNECTION_STRING" | grep -oP 'AccountKey=\K[^;]+')
              EXPIRY=$(date -u -d '+4 hours' '+%Y-%m-%dT%H:%MZ')
              SAS_TOKEN=$(az storage container generate-sas \
                --account-name "$ACCOUNT_NAME" \
                --account-key "$ACCOUNT_KEY" \
                --name "$BLOB_CONTAINER_NAME" \
                --permissions rl \
                --expiry "$EXPIRY" \
                --output tsv)

              TEMP_DIR="$MCP_SERVER_PATH/_azcopy_tmp_cust"
              DEST_DIR="$MCP_SERVER_PATH/metadata"
              SOURCE_URL="https://${ACCOUNT_NAME}.blob.core.windows.net/${BLOB_CONTAINER_NAME}/metadata/custom/?${SAS_TOKEN}"

              echo "Downloading custom metadata via azcopy..."
              mkdir -p "$TEMP_DIR" "$DEST_DIR"
              AZCOPY_CONCURRENCY_VALUE=64 azcopy copy "$SOURCE_URL" "$TEMP_DIR/" \
                --recursive \
                --log-level WARNING

              if [ -d "$TEMP_DIR/custom" ]; then
                mv "$TEMP_DIR/custom/"* "$DEST_DIR/"
              else
                mv "$TEMP_DIR/"* "$DEST_DIR/" 2>/dev/null || true
              fi
              rm -rf "$TEMP_DIR"

              echo "Custom metadata download complete. Files: $(find "$DEST_DIR" -type f | wc -l)"
            displayName: 'Download custom metadata via azcopy (skipExtraction mode)'
            condition: eq('${{ parameters.skipExtraction }}', true)
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)

          # ========== Step 3: Delete Old Custom Metadata ==========
          # Skipped when skipExtraction=true (no new extraction → no need to clean blob)

          - script: |
              if [ -n "${{ parameters.customModels }}" ] && [ "${{ parameters.customModels }}" != "all" ]; then
                npm run blob-manager delete-custom "${{ parameters.customModels }}"
              else
                npm run blob-manager delete-custom
              fi
            displayName: 'Delete old custom metadata from blob'
            condition: and(eq('${{ parameters.extractionMode }}', 'custom'), eq('${{ parameters.skipExtraction }}', false))
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)

          # ========== Step 4: Extract Models from Git Source ==========
          # Skipped when skipExtraction=true

          - script: |
              if [ "${{ parameters.customModels }}" != "all" ]; then
                export CUSTOM_MODELS="${{ parameters.customModels }}"
              fi
              # 'all' mode: extract only custom (standard already downloaded from blob)
              # 'custom' mode: extract only custom models
              # 'standard' mode: extract only standard models
              if [ "${{ parameters.extractionMode }}" = "all" ]; then
                export EXTRACT_MODE="custom"
              else
                export EXTRACT_MODE="${{ parameters.extractionMode }}"
              fi
              npm run extract-metadata
            displayName: 'Extract models from Git source'
            condition: eq('${{ parameters.skipExtraction }}', false)
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              PACKAGES_PATH: $(PACKAGES_PATH)
              D365FO_PACKAGE_PATH: $(D365FO_PACKAGE_PATH)
              METADATA_PATH: $(METADATA_PATH)
              EXTENSION_PREFIX: $(EXTENSION_PREFIX)

          # ========== Step 4b: Download Existing Labels DB (skipExtraction only) ==========
          # When skipExtraction=true, PACKAGES_PATH (Git source) is not available so labels
          # cannot be re-indexed. Download the previously built labels DB from blob instead.

          - script: npm run blob-manager download-database
            displayName: 'Download existing labels database (skipExtraction mode)'
            condition: eq('${{ parameters.skipExtraction }}', true)
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              DB_PATH: $(LABELS_DB_PATH)

          # ========== Step 5: Build Database ==========

          - script: npm run build-database
            displayName: 'Build database (incremental update of custom models)'
            workingDirectory: '$(MCP_SERVER_PATH)'
            timeoutInMinutes: 90
            env:
              METADATA_PATH: $(METADATA_PATH)
              DB_PATH: $(DB_PATH)
              LABELS_DB_PATH: $(LABELS_DB_PATH)
              PACKAGES_PATH: $(PACKAGES_PATH)
              D365FO_PACKAGE_PATH: $(D365FO_PACKAGE_PATH)
              EXTRACT_MODE: '${{ parameters.extractionMode }}'
              ${{ if parameters.skipExtraction }}:
                INCLUDE_LABELS: 'false'
              ${{ else }}:
                INCLUDE_LABELS: 'true'
              LABEL_LANGUAGES: $(LABEL_LANGUAGES)
              COMPUTE_STATS: 'true'
              ENABLE_SEARCH_SUGGESTIONS: 'false'  # Disable suggestions in CI/CD to reduce memory usage
              NODE_OPTIONS: '--max-old-space-size=4096 --expose-gc'

          # ========== Step 6: Upload Custom Metadata ==========
          # Skipped when skipExtraction=true (no new custom metadata was extracted)

          - script: |
              if [ "${{ parameters.customModels }}" != "all" ]; then
                export CUSTOM_MODELS="${{ parameters.customModels }}"
              fi
              npm run blob-manager upload-custom
            displayName: 'Upload custom metadata'
            condition: and(eq('${{ parameters.extractionMode }}', 'custom'), eq('${{ parameters.skipExtraction }}', false))
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              METADATA_PATH: $(METADATA_PATH)

          # ========== Step 7: Upload Databases to Blob Storage ==========

          - script: npm run blob-manager upload-database
            displayName: 'Upload symbols database to Azure Blob'
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              DB_PATH: $(DB_PATH)

          - script: npm run blob-manager upload-database
            displayName: 'Upload labels database to Azure Blob'
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              DB_PATH: $(LABELS_DB_PATH)

          # ========== Step 8: Restart App Service ==========

          - task: AzureAppServiceManage@0
            displayName: 'Restart App Service'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              action: 'Restart Azure App Service'
              webAppName: '$(AZURE_APP_SERVICE_NAME)'

          # ========== Step 9: Log Completion ==========

          - script: |
              echo ""
              echo "============================================"
              if [ "${{ parameters.skipExtraction }}" = "True" ]; then
                echo "Database rebuild completed! (metadata from blob)"
              else
                echo "Custom metadata update completed!"
              fi
              echo "============================================"
              echo ""
              if [ "${{ parameters.skipExtraction }}" = "True" ]; then
                echo "⏭️  Extraction skipped — used existing blob metadata"
              else
                echo "✅ Custom metadata extracted"
                echo "✅ Custom metadata uploaded to blob"
              fi
              echo "✅ Database built (incremental update)"
              echo "✅ Databases uploaded to Azure Blob"
              echo "✅ App Service restarted"
              echo ""
              echo "Your MCP server is now running with the latest custom models"
              echo "============================================"
            displayName: 'Log completion summary'
