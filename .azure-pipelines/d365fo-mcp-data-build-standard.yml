# Azure Pipeline for Standard D365FO Metadata Extraction from Azure Blob Storage
# This pipeline downloads and extracts standard D365 models from PackagesLocalDirectory.zip
# Runs: Few times per year (D365 upgrade, hotfix) or manual trigger

trigger: none  # Manual execution only

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: mcpServer
      type: github
      endpoint: github.com_dynamics365ninja
      name: dynamics365ninja/d365fo-mcp-server
      ref: refs/heads/main

variables:
  - group: xpp-mcp-server-config
  - name: nodeVersion
    value: '24.x'
  - name: METADATA_PATH
    value: './metadata'
  - name: DB_PATH
    value: './database/xpp-metadata.db'
  - name: LABELS_DB_PATH
    value: './database/xpp-metadata-labels.db'
  - name: PACKAGES_DIR_NAME
    value: 'PackagesLocalDirectory'
  - name: PACKAGES_ZIP_PATH
    value: '$(Pipeline.Workspace)/$(PACKAGES_DIR_NAME).zip'
  - name: PACKAGES_CONTAINER_NAME
    value: 'packages'
  - name: MCP_SERVER_PATH
    value: '$(Pipeline.Workspace)/mcp-server'

stages:
  # ============================================================================
  # Single Stage: Download, Extract, and Upload
  # ============================================================================
  - stage: ExtractAndUpload
    displayName: 'Extract Standard Metadata and Upload to Blob'
    jobs:
      # ──────────────────────────────────────────────────────────────────────
      # Job 1 – Download, extract, build symbol rows only  (Phase 1)
      # FTS rebuild is deferred to Job 2 so each job fits within 120 min.
      # ──────────────────────────────────────────────────────────────────────
      - job: BuildSymbols
        displayName: 'Phase 1: Download → Extract → Build Symbols'
        timeoutInMinutes: 120
        steps:
          # ========== Checkout MCP Server code from GitHub ==========
          - checkout: mcpServer
            displayName: 'Checkout MCP Server code from GitHub'
            path: mcp-server

          # ========== Install Node.js and Dependencies ==========

          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: 'Install NPM dependencies'
            workingDirectory: '$(MCP_SERVER_PATH)'

          # ========== Download PackagesLocalDirectory.zip ==========

          - script: |
              echo "Downloading $(PACKAGES_DIR_NAME).zip from Azure Blob Storage..."
              az storage blob download \
                --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
                --container-name $(PACKAGES_CONTAINER_NAME) \
                --name $(PACKAGES_DIR_NAME).zip \
                --file $(PACKAGES_ZIP_PATH) \
                --output table
              echo "Download completed successfully"
              ls -lh $(PACKAGES_ZIP_PATH)
            displayName: 'Download $(PACKAGES_DIR_NAME).zip from Azure Blob'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)

          # ========== Extract PackagesLocalDirectory.zip ==========

          - script: |
              echo "Extracting $(PACKAGES_DIR_NAME).zip..."
              unzip -q $(PACKAGES_ZIP_PATH) -d $(Pipeline.Workspace)
              echo "Extraction completed successfully"
              ls -la $(Pipeline.Workspace)/$(PACKAGES_DIR_NAME)
            displayName: 'Extract $(PACKAGES_DIR_NAME).zip'

          # ========== Extract Metadata ==========

          - script: npm run extract-metadata
            displayName: 'Extract standard metadata from packages'
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              PACKAGES_PATH: $(Pipeline.Workspace)/$(PACKAGES_DIR_NAME)
              METADATA_PATH: $(METADATA_PATH)
              EXTRACT_MODE: 'standard'

          # ========== Upload Metadata to Blob Storage ==========

          - script: npm run blob-manager upload-standard
            displayName: 'Upload standard metadata to Azure Blob'
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              METADATA_PATH: $(METADATA_PATH)

          # ========== Phase 1: Build symbol rows, skip FTS ==========
          # SKIP_FTS=true defers the FTS rebuild to Job 2 (build-fts).
          # INCLUDE_LABELS=false — PackagesLocalDirectory not available in Job 2.
          # Models are sorted largest-first (Foundation 56K files → first commit).

          - script: npm run build-database
            displayName: 'Build symbols database (Phase 1 – SKIP_FTS=true)'
            workingDirectory: '$(MCP_SERVER_PATH)'
            timeoutInMinutes: 110
            env:
              METADATA_PATH: $(METADATA_PATH)
              DB_PATH: $(DB_PATH)
              EXTRACT_MODE: 'standard'
              SKIP_FTS: 'true'
              INCLUDE_LABELS: 'false'
              COMPUTE_STATS: 'false'
              ENABLE_SEARCH_SUGGESTIONS: 'false'
              NODE_OPTIONS: '--max-old-space-size=4096 --expose-gc'

          # ========== Pass partial DB to Job 2 via pipeline artifact ==========

          - task: PublishPipelineArtifact@1
            displayName: 'Publish partial database artifact'
            inputs:
              targetPath: '$(MCP_SERVER_PATH)/database/xpp-metadata.db'
              artifact: 'xpp-metadata-db'
              publishLocation: 'pipeline'

      # ──────────────────────────────────────────────────────────────────────
      # Job 2 – Rebuild FTS index, finalize, upload  (Phase 2)
      # Runs on a fresh agent after Job 1 completes.
      # ──────────────────────────────────────────────────────────────────────
      - job: BuildFTS
        displayName: 'Phase 2: Rebuild FTS Index → Upload'
        dependsOn: BuildSymbols
        timeoutInMinutes: 120
        steps:
          - checkout: mcpServer
            displayName: 'Checkout MCP Server code from GitHub'
            path: mcp-server

          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: 'Install NPM dependencies'
            workingDirectory: '$(MCP_SERVER_PATH)'

          # ========== Download partial DB from Job 1 ==========

          - task: DownloadPipelineArtifact@2
            displayName: 'Download partial database artifact'
            inputs:
              artifact: 'xpp-metadata-db'
              targetPath: '$(MCP_SERVER_PATH)/database'

          # ========== Phase 2: FTS rebuild + WAL conversion ==========
          # INCLUDE_LABELS=false: PackagesLocalDirectory not available on this agent.

          - script: npm run build-fts
            displayName: 'Rebuild FTS index + finalize database (Phase 2)'
            workingDirectory: '$(MCP_SERVER_PATH)'
            timeoutInMinutes: 110
            env:
              DB_PATH: $(DB_PATH)
              LABELS_DB_PATH: $(LABELS_DB_PATH)
              INCLUDE_LABELS: 'false'
              NODE_OPTIONS: '--max-old-space-size=4096 --expose-gc'

          # ========== Upload Final Database ==========

          - script: npm run blob-manager upload-database
            displayName: 'Upload compiled database to Azure Blob'
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              DB_PATH: $(DB_PATH)

          # Restart App Service
          - task: AzureAppServiceManage@0
            displayName: 'Restart App Service'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              action: 'Restart Azure App Service'
              webAppName: '$(AZURE_APP_SERVICE_NAME)'

          - script: |
              echo ""
              echo "============================================"
              echo "Standard metadata extraction completed!"
              echo "============================================"
              echo ""
              echo "✅ Metadata extracted and uploaded (Phase 1)"
              echo "✅ FTS index rebuilt (Phase 2)"
              echo "✅ Database uploaded to Azure Blob"
              echo "✅ App Service restarted"
              echo ""
              echo "Next step: Run custom pipeline to update custom models"
              echo "============================================"
            displayName: 'Log completion summary'