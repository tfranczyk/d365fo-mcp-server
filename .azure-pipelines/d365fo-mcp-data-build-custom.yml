# Simplified Azure Pipeline for Daily Custom Metadata Updates
# This pipeline is optimized for quick updates of custom models only
# Triggers automatically on changes to dev branch (no periodic runs)

trigger:
  branches:
    include:
      - dev
  paths:
    include:
      - 'src/**'
      - '.azure-pipelines/d365fo-mcp-data-build-custom.yml'

# Note: No scheduled runs - pipeline runs only when changes are detected
# To force a run, use manual trigger with parameters below

# Manual trigger with parameters
parameters:
  - name: extractionMode
    displayName: 'Extraction Mode'
    type: string
    default: 'custom'
    values:
      - custom
      - standard
      - all
  - name: customModels
    displayName: 'Custom Models (comma-separated, or all)'
    type: string
    default: 'all'

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: mcpServer
      type: github
      endpoint: github.com_dynamics365ninja
      name: dynamics365ninja/d365fo-mcp-server
      ref: refs/heads/main

variables:
  - group: xpp-mcp-server-config
  - name: nodeVersion
    value: '24.x'
  - name: METADATA_PATH
    value: './metadata'
  - name: DB_PATH
    value: './database/xpp-metadata.db'
  - name: LABELS_DB_PATH
    value: './database/xpp-metadata-labels.db'
  - name: PACKAGES_PATH
    value: '$(Build.SourcesDirectory)/ASL/src/d365fo/metadata'
  - name: MCP_SERVER_PATH
    value: '$(Pipeline.Workspace)/mcp-server'

stages:
  # ============================================================================
  # Single Stage: Process Metadata Based on Mode
  # ============================================================================
  - stage: ProcessMetadata
    displayName: 'Process Metadata'
    jobs:
      - job: ProcessJob
        displayName: 'Extract, Build, and Upload'
        steps:
          # ========== Checkout D365FO source code (Azure DevOps) ==========
          - checkout: self
            displayName: 'Checkout D365FO source code'
            clean: true
          
          # ========== Checkout MCP Server code from GitHub ==========
          - checkout: mcpServer
            displayName: 'Checkout MCP Server code from GitHub'
            path: mcp-server

          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: 'Install dependencies'
            workingDirectory: '$(MCP_SERVER_PATH)'

          # ========== Custom Mode Steps (default) ==========
          # In custom mode, we only update custom models while preserving standard models in the database
          
          # Download existing database (contains standard models)
          - script: npm run blob-manager download-database
            displayName: 'Download existing database'
            condition: eq('${{ parameters.extractionMode }}', 'custom')
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              DB_PATH: $(DB_PATH)

          # Download standard metadata (only for standard/all modes, not for custom)
          - script: npm run blob-manager download-standard
            displayName: 'Download standard metadata (cached)'
            condition: ne('${{ parameters.extractionMode }}', 'custom')
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              METADATA_PATH: $(METADATA_PATH)

          # Delete old custom metadata from blob
          - script: |
              if [ -n "${{ parameters.customModels }}" ] && [ "${{ parameters.customModels }}" != "all" ]; then
                npm run blob-manager delete-custom "${{ parameters.customModels }}"
              else
                npm run blob-manager delete-custom
              fi
            displayName: 'Delete old custom metadata from blob'
            condition: eq('${{ parameters.extractionMode }}', 'custom')
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)

          # Extract custom models from Git source
          - script: |
              if [ "${{ parameters.customModels }}" != "all" ]; then
                export CUSTOM_MODELS="${{ parameters.customModels }}"
              fi
              # For 'all' mode, extract only custom models (standard are already downloaded from blob)
              # For 'custom' mode, extract only custom models
              # For 'standard' mode, extract only standard models (but Git usually contains only custom)
              if [ "${{ parameters.extractionMode }}" = "all" ]; then
                export EXTRACT_MODE="custom"
              else
                export EXTRACT_MODE="${{ parameters.extractionMode }}"
              fi
              npm run extract-metadata
            displayName: 'Extract models from Git source'
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              PACKAGES_PATH: $(PACKAGES_PATH)
              METADATA_PATH: $(METADATA_PATH)
              EXTENSION_PREFIX: $(EXTENSION_PREFIX)

          # ========== Common Steps for All Modes ==========
          
          # Build database (custom mode: only replaces custom models, standard mode: replaces standard models, all mode: full rebuild)
          # INCLUDE_LABELS=true with incremental build:
          # - Standard model labels remain in database (downloaded from blob)
          # - Only custom model labels are cleared and re-indexed from PACKAGES_PATH
          # - If .label.txt files are not in Git repo, indexing is skipped with a warning
          - script: |
              if [ "${{ parameters.customModels }}" != "all" ]; then
                export CUSTOM_MODELS="${{ parameters.customModels }}"
              fi
              npm run build-database
            displayName: 'Build database with custom model labels'
            workingDirectory: '$(MCP_SERVER_PATH)'
            timeoutInMinutes: 90
            env:
              METADATA_PATH: $(METADATA_PATH)
              DB_PATH: $(DB_PATH)
              LABELS_DB_PATH: $(LABELS_DB_PATH)
              PACKAGES_PATH: $(PACKAGES_PATH)
              EXTRACT_MODE: '${{ parameters.extractionMode }}'
              INCLUDE_LABELS: 'true'
              COMPUTE_STATS: 'false'
              ENABLE_SEARCH_SUGGESTIONS: 'false'
              NODE_OPTIONS: '--max-old-space-size=4096 --expose-gc'

          # Upload metadata based on mode
          - script: |
              if [ "${{ parameters.customModels }}" != "all" ]; then
                export CUSTOM_MODELS="${{ parameters.customModels }}"
              fi
              npm run blob-manager upload-custom
            displayName: 'Upload custom metadata'
            condition: eq('${{ parameters.extractionMode }}', 'custom')
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)
              METADATA_PATH: $(METADATA_PATH)

          # Upload databases
          - script: npm run blob-manager upload-database $(DB_PATH)
            displayName: 'Upload main database'
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)

          - script: npm run blob-manager upload-database $(LABELS_DB_PATH)
            displayName: 'Upload labels database'
            workingDirectory: '$(MCP_SERVER_PATH)'
            env:
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              BLOB_CONTAINER_NAME: $(BLOB_CONTAINER_NAME)

          # Restart App Service
          - task: AzureAppServiceManage@0
            displayName: 'Restart App Service'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              action: 'Restart Azure App Service'
              webAppName: '$(AZURE_APP_SERVICE_NAME)'